name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # 修改为你的主分支名（如 master）如果需要

# 并发控制，防止同时触发多个部署
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (for GitHub Pages project site)
        # 通过设置 DEPLOY_TO_GH_PAGES，让 vite.config.ts 在构建时把 base 设置为 `/repo/`
        env:
          DEPLOY_TO_GH_PAGES: "true"
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # keep_files: true # 如果需要保留 gh-pages 分支上除 dist 之外的其它文件，可取消注释并设为 true

      - name: Post-deploy info
        if: success()
        run: |
          echo "Deployment finished. If this is a project page, the site should be available at:"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "https://$(echo $GITHUB_REPOSITORY | cut -d'/' -f1).github.io/${REPO_NAME}/"
